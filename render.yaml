services:
  - type: web
    name: energy-r3-intelligence
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: echo "⚡ ENERGY R3 - No dependencies needed" && python -c "print('✅ System ready')"
    startCommand: python ENERGY_R3.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SYSTEM_TYPE
        value: energy_intelligence
      - key: RENDER
        value: "true"
